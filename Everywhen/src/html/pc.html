<div class="flex-column core">
    <div class="flex-row frame align-center">
        <label class="label w-1"><span data-i18n="common.name">Name</span></label>
        <input type="text" class="input w-11" name="attr_character_name"></input>
    </div>
    <div class="flex-row">
        <div class="flex-column w-6 justify-sb">
            <div class="flex-row">
                <div class="flex-column w-6 frame">
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="attributes.strength">Strength</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_strength"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{strength}]]" class="w-2 custom-roll"></button>
                    </div>
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="attributes.agility">Agility</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_agility"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{agility}]]" class="w-2 custom-roll"></button>
                    </div>
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="attributes.mind">Mind</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_mind"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{mind}]]" class="w-2 custom-roll"></button>
                    </div>
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="attributes.appeal">Appeal</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_appeal"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{appeal}]]" class="w-2 custom-roll"></button>  
                    </div>
                </div>
                <div class="flex-column w-6 frame">
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="combat.initiative">Initiative</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_initiative"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{initiative}]]" class="w-2 custom-roll"></button>
                    </div>
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="combat.melee">Melee</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_melee"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{melee}]]" class="w-2 custom-roll"></button>
                    </div>
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="combat.ranged">Ranged</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_ranged"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{ranged}]]" class="w-2 custom-roll"></button>
                    </div>
                    <div class="flex-row align-center">
                        <label class="label w-8"><span data-i18n="combat.defense">Defense</span></label>
                        <input type="number" class="bordered-input input w-2" name="attr_defense"></input>
                        <button type="roll" name="attr_atq-roll" value="[[2d6 + @{defense}]]" class="w-2 custom-roll"></button>
                    </div>
                </div>
            </div>
            <div class="flex-column w-12 frame">
                <label class="title label"><span data-i18n="common.languages">Languages</span></label>
                <input type="text" class="input w-12" name="attr_languages"></input>
            </div>
        </div>
        <div class="flex-column w-3 frame">
            <div class="flex-row">
